name: Complete CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run tests
      - name: Run tests
        run: |
          pytest
          flake8 .

      # Step 5: Docker login
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 6: Build Docker image with multiple tags
      - name: Build Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/your-app
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t $IMAGE:latest -t $IMAGE:v1.0.0 -t $IMAGE:$SHA .

      # Step 7: Push Docker image
      - name: Push Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/your-app
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker push $IMAGE:latest
          docker push $IMAGE:v1.0.0
          docker push $IMAGE:$SHA

      # Step 8: Deploy to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE=${{ secrets.DOCKER_USERNAME }}/your-app
            echo "Pulling latest Docker image..."
            docker pull $IMAGE:latest

            echo "Stopping old container (if exists)..."
            docker stop webapp || true
            docker rm webapp || true

            echo "Running new container..."
            docker run -d --name webapp -p 5000:5000 --restart always $IMAGE:latest